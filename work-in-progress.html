<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work In Progress | Math Pathways</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      background-color: #0f172a;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .animated-border {
      position: relative;
      background: #1e293b;
      border-radius: 1rem;
    }
    .animated-border::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 1rem;
      padding: 1px;
      background: linear-gradient(45deg,#3b82f6,#22d3ee,#6366f1,#3b82f6);
      background-size: 300% 300%;
      animation: borderFlow 6s linear infinite;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    @keyframes borderFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-6">
  <canvas id="bgCanvas"></canvas>

  <main class="animated-border max-w-xl w-full p-8 text-center">
    <p class="mono text-xs text-cyan-300 tracking-widest uppercase">Status</p>
    <h1 class="text-3xl md:text-4xl font-extrabold mt-3">Work In Progress</h1>
    <p class="text-slate-300 mt-4">
      Lecture plans for this subject are not added yet. We will build this page once the syllabus plan is available.
    </p>
    <a href="index.html" class="inline-block mt-7 mono text-sm text-cyan-300 hover:text-cyan-200 transition-colors">
      ← Back to Dashboard
    </a>
  </main>

  <script>
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");
    const particles = [];
    const particleCount = 110;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function init() {
      particles.length = 0;
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 1,
          vy: (Math.random() - 0.5) * 1
        });
      }
    }

    function draw() {
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particleCount; i++) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        ctx.fillStyle = "#22d3ee";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.6, 0, Math.PI * 2);
        ctx.fill();
        for (let j = i + 1; j < particleCount; j++) {
          const p2 = particles[j];
          const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
          if (dist < 120) {
            ctx.strokeStyle = "rgba(59,130,246,0.15)";
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }

    resize();
    init();
    draw();
    window.addEventListener("resize", () => {
      resize();
      init();
    });
  </script>
</body>
</html>
